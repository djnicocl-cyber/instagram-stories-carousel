<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Stories Carousel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:340px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#fafafa; color:#262626; }
.header { background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); padding:12px 16px; color:white; text-align:center; }
.header h1 { font-size:14px; font-weight:700; }
.content { padding:14px 16px; }
label { display:block; font-size:11px; font-weight:600; color:#8e8e8e; text-transform:uppercase; margin-bottom:4px; }
input { width:100%; padding:9px 11px; border:1.5px solid #dbdbdb; border-radius:8px; font-size:14px; outline:none; }
input:focus { border-color:#833ab4; }
.btn { width:100%; padding:11px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:7px; }
.btn-load { background:white; border:1.5px solid #dbdbdb; color:#262626; font-size:12px; padding:8px; border-radius:8px; width:100%; cursor:pointer; margin:8px 0; }
.btn-start { background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color:white; }
.btn-stop { background:#efefef; color:#262626; }
#storiesPanel { margin:8px 0; max-height:150px; overflow-y:auto; border:1.5px solid #dbdbdb; border-radius:8px; background:white; }
.story-item { display:flex; align-items:center; padding:7px 10px; border-bottom:1px solid #f0f0f0; font-size:13px; }
.story-item:last-child { border-bottom:none; }
.story-item img { width:32px; height:32px; border-radius:50%; margin-right:8px; object-fit:cover; }
#status { font-size:12px; text-align:center; padding:6px; border-radius:6px; margin-top:6px; color:#888; }
.footer { font-size:11px; color:#8e8e8e; text-align:center; padding:4px 16px 12px; }
</style>
</head>
<body>
<div class="header"><h1>Stories Carousel</h1></div>
<div class="content">
  <label>Usuario de Instagram</label>
  <input type="text" id="username" placeholder="ej: natgeo" autocomplete="off">
  <button class="btn-load" id="btnLoad">Ver historias disponibles</button>
  <div id="storiesPanel"></div>
  <button class="btn btn-start" id="btnStart">Iniciar Bucle</button>
  <button class="btn btn-stop" id="btnStop" style="display:none">Detener Bucle</button>
  <div id="status"></div>
</div>
<div class="footer">Bucle automatico sin interrupciones</div>
<script src="popup.js"></script>
</body>
</html>
